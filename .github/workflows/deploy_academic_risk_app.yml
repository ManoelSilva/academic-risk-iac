name: Deploy Academic Risk App to EC2

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Clean up previous deployment files
        run: |
          ssh -o StrictHostKeyChecking=no ec2-user@${{ secrets.EC2_HOST }} \
            "sudo rm -rf /opt/academic-risk-app && \
             sudo rm -rf /usr/share/nginx/html/* && \
             sudo rm -f /etc/nginx/conf.d/academic-risk-app.conf"

      - name: Copy nginx config to EC2
        run: |
          scp -o StrictHostKeyChecking=no ./src/academic-risk-app-nginx.conf ec2-user@${{ secrets.EC2_HOST }}:/tmp/

      - name: Copy deploy script to EC2
        run: |
          scp -o StrictHostKeyChecking=no ./src/deploy_academic_risk_app.sh ec2-user@${{ secrets.EC2_HOST }}:/tmp/

      - name: Run deploy script on EC2
        run: |
          ssh -o StrictHostKeyChecking=no ec2-user@${{ secrets.EC2_HOST }} \
            "sudo EC2_HOST='${{ secrets.EC2_HOST }}' bash /tmp/deploy_academic_risk_app.sh"

# Required secrets:
# - EC2_SSH_KEY: Private SSH key for ec2-user
# - EC2_HOST: Public IP or DNS of the EC2 instance
