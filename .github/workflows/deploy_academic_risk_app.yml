name: Deploy Academic Risk App to EC2

on:
  workflow_dispatch:
    inputs:
      academic_risk_app_branch:
        description: "Branch to deploy for academic-risk-app"
        required: true
        default: "main"
      academic_risk_model_branch:
        description: "Branch to deploy for academic-risk-model"
        required: true
        default: "main"
      monitoring_branch:
        description: "Branch to deploy for monitoring stack"
        required: true
        default: "main"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.academic_risk_app_branch || github.ref_name }}

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}
          log-public-key: false

      - name: Clean up previous deployment files
        run: |
          ssh -o StrictHostKeyChecking=no ec2-user@${{ secrets.EC2_HOST }} \
            "sudo rm -rf /opt/academic-risk-app && \
             sudo rm -rf /usr/share/nginx/html/* && \
             sudo rm -f /etc/nginx/conf.d/academic-risk-app.conf"

      - name: Copy nginx config to EC2
        run: |
          scp -o StrictHostKeyChecking=no ./src/academic-risk-app-nginx.conf ec2-user@${{ secrets.EC2_HOST }}:/tmp/

      - name: Copy deploy script to EC2
        run: |
          scp -o StrictHostKeyChecking=no ./src/deploy_academic_risk_app.sh ec2-user@${{ secrets.EC2_HOST }}:/tmp/

      - name: Run deploy script on EC2
        run: |
          ssh -o StrictHostKeyChecking=no ec2-user@${{ secrets.EC2_HOST }} \
            "sudo EC2_HOST='${{ secrets.EC2_HOST }}' BRANCH='${{ github.event.inputs.academic_risk_app_branch || github.ref_name }}' MODEL_API_PORT='${{ secrets.MODEL_API_PORT }}' bash /tmp/deploy_academic_risk_app.sh"

# Required secrets:
# - EC2_SSH_KEY: Private SSH key for ec2-user
# - EC2_HOST: Public IP or DNS of the EC2 instance
# Optional secrets:
# - MODEL_API_PORT: Port for the model API (defaults to 5000)
