name: Deploy Monitoring Stack to EC2

on:
  workflow_dispatch:
    inputs:
      monitoring_branch:
        description: "Branch to deploy for monitoring stack"
        required: true
        default: "main"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.monitoring_branch || github.ref_name }}

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}
          log-public-key: false

      - name: Copy deploy script to EC2
        run: |
          scp -o StrictHostKeyChecking=no ./src/deploy_monitoring.sh ec2-user@${{ secrets.EC2_HOST }}:/tmp/

      - name: Run deploy script on EC2
        run: |
          ssh -o StrictHostKeyChecking=no ec2-user@${{ secrets.EC2_HOST }} \
            "sudo EC2_HOST='${{ secrets.EC2_HOST }}' BRANCH='${{ github.event.inputs.monitoring_branch || github.ref_name }}' bash /tmp/deploy_monitoring.sh"

# Required secrets:
# - EC2_SSH_KEY: Private SSH key for ec2-user
# - EC2_HOST: Public IP or DNS of the EC2 instance
