version: '3.8'

services:
  academic-risk-model:
    build:
      context: ../academic-risk-model
      dockerfile: Dockerfile
    container_name: academic-risk-model
    ports:
      - "5000:5000"
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=5000
      - LOG_LEVEL=INFO
      - MODEL_PATH=models/production/model.joblib
      - MLFLOW_TRACKING_URI=http://mlflow:5001
    volumes:
      - ../academic-risk-model/models:/app/models
      - ../academic-risk-model/data:/app/data
    depends_on:
      mlflow:
        condition: service_healthy
    networks:
      - academic-risk-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  academic-risk-app:
    build:
      context: ../academic-risk-app
      dockerfile: Dockerfile
    container_name: academic-risk-app
    ports:
      - "4200:4200"
      - "3000:3000"
    environment:
      - PORT=3000
      - RISK_MODEL_URL=http://academic-risk-model:5000
    depends_on:
      - academic-risk-model
    networks:
      - academic-risk-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.3.1
    container_name: mlflow
    user: "0:0"
    ports:
      - "5001:5001"
    command: ["bash", "-c", "mkdir -p /mlflow/artifacts && mlflow server --host 0.0.0.0 --port 5001 --backend-store-uri sqlite:///mlflow/mlflow.db --serve-artifacts --artifacts-destination /mlflow/artifacts"]
    volumes:
      - mlflow-data:/mlflow
    networks:
      - academic-risk-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  mlflow-exporter:
    build:
      context: ./monitoring/mlflow-exporter
      dockerfile: Dockerfile
    container_name: mlflow-exporter
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5001
      - SCRAPE_INTERVAL=30
      - EXPORTER_PORT=8000
    depends_on:
      mlflow:
        condition: service_healthy
    networks:
      - academic-risk-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=90d"
      - "--web.enable-lifecycle"
    depends_on:
      - mlflow-exporter
    networks:
      - academic-risk-network
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    depends_on:
      - prometheus
    networks:
      - academic-risk-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.2
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/api-observability.json
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - academic-risk-network
    restart: unless-stopped

volumes:
  mlflow-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  academic-risk-network:
    driver: bridge
