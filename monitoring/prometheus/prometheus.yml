global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: "academic-risk"
    environment: "production"

rule_files:
  - "/etc/prometheus/alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "mlflow-exporter"
    scrape_interval: 30s
    static_configs:
      - targets: ["mlflow-exporter:8000"]
    metrics_path: /metrics

  - job_name: "academic-risk-model"
    scrape_interval: 15s
    static_configs:
      - targets: ["host.docker.internal:5000"]
    metrics_path: /metrics

  - job_name: "academic-risk-app"
    scrape_interval: 15s
    static_configs:
      - targets: ["host.docker.internal:3000"]
    metrics_path: /api/metrics
