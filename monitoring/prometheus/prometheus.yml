global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "mlflow-exporter"
    scrape_interval: 30s
    static_configs:
      - targets: ["mlflow-exporter:8000"]
    metrics_path: /metrics
